name: release

# Build vaa CLI binaries for Linux, macOS, and Windows on every version tag
# and attach them as release assets. The release object itself is expected
# to already exist (created by `gh release create v…`); this workflow only
# uploads the per-target binary artefacts.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: rustup show && rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build vaa CLI (release)
        run: cargo build -p vaa-cli --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vaa${{ matrix.ext }} dist/
          cp LICENSE README.md SECURITY.md dist/
          tar -C dist -czf vaa-${{ github.ref_name }}-${{ matrix.target }}.tar.gz .

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\vaa${{ matrix.ext }}" dist\
          Copy-Item LICENSE,README.md,SECURITY.md dist\
          Compress-Archive -Path dist\* -DestinationPath "vaa-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Smoke-test (unix)
        if: matrix.archive == 'tar.gz'
        run: ./target/${{ matrix.target }}/release/vaa selftest

      - name: Smoke-test (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: .\target\${{ matrix.target }}\release\vaa.exe selftest

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vaa-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          fail_on_unmatched_files: true
